<!-- Summary Panel — positioned inline within the frame -->
<div class="flex flex-col gap-3 pointer-events-none select-none">

  <!-- ═══════════════════════════════════════════════ -->
  <!-- Table 1: ⌛ 2025 | Yesterday | 🎁 Today        -->
  <!-- ═══════════════════════════════════════════════ -->
  <div class="bg-white flex flex-col pt-4">
 
     <!-- ALL HEADER LABELS + VALUES AS UNIFIED UNITS (Scalar Standard: 15px) -->
     <div class="grid grid-cols-3 bg-white">
       
       <!-- UNIT: Jan -->
       <div class="py-8 px-3 flex flex-col items-center justify-center">
         <span class="text-[11px] font-bold text-slate tracking-tight mb-1">⌛ Jan</span>
         <span class="text-[15px] font-black text-slate leading-none">{{ rows().startOfYear !== null ? fmt(rows().startOfYear!) : '—' }}</span>
         <span class="text-[10px] font-bold mt-2" [class.text-emerald-700]="isPositive(pcts().todayVsStartOfYear)" [class.text-rose-700]="!isPositive(pcts().todayVsStartOfYear)">{{ fmtPct(pcts().todayVsStartOfYear) }}</span>
       </div>

       <!-- UNIT: Previous -->
       <div class="py-8 px-3 flex flex-col items-center justify-center">
         <span class="text-[11px] font-bold text-slate tracking-tight mb-1">Previous</span>
         <span class="text-[15px] font-black text-slate leading-none">{{ rows().previous !== null ? fmt(rows().previous!) : '—' }}</span>
         <span class="text-[11px] font-bold mt-2" [class.text-emerald-700]="isPositive(pcts().previousVsStartOfYear)" [class.text-rose-700]="!isPositive(pcts().previousVsStartOfYear)">{{ fmtPct(pcts().previousVsStartOfYear) }}</span>
       </div>

       <!-- UNIT: Today -->
       <div class="py-8 px-3 flex flex-col items-center justify-center">
         <span class="text-[11px] font-bold text-slate tracking-tight mb-1">🎁 Today</span>
         <span class="text-[15px] font-black text-slate leading-none">{{ fmt(rows().today) }}</span>
         <span class="text-[11px] font-bold mt-2" [class.text-emerald-700]="isPositive(pcts().todayVsPrevious)" [class.text-rose-700]="!isPositive(pcts().todayVsPrevious)">{{ fmtPct(pcts().todayVsPrevious) }}</span>
       </div>

     </div>

   </div>

</div>
