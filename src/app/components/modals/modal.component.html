<div
  class="fixed inset-0 z-200 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center transition-all duration-300"
  [class.opacity-0]="!isOpen()"
  [class.pointer-events-none]="!isOpen()"
  [class.opacity-100]="isOpen()"
  role="dialog"
  aria-modal="true"
  [attr.aria-labelledby]="titleId()"
>
  <!-- Modal Container -->
  <div
    class="bg-white rounded-[32px] shadow-2xl p-8 border border-gray-100 flex flex-col relative transition-all duration-300 max-w-[80vw]"
    [class]="widthClass()"
    [class.scale-95]="!isOpen()"
    [class.scale-100]="isOpen()"
    [class.translate-y-4]="!isOpen()"
    [class.translate-y-0]="isOpen()"
    [class.opacity-0]="!isOpen()"
    [class.opacity-100]="isOpen()"
  >
    <!-- Dismiss Button -->
    <button
      (click)="dismiss.emit()"
      class="btn-dismiss absolute top-8 right-8 interactive-element"
      [attr.aria-label]="'Close ' + title()"
    >
      <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 16 16">
        <path
          d="M2.146 2.854a.5.5 0 1 1 .708-.708L8 7.293l5.146-5.147a.5.5 0 0 1 .708.708L8.707 8l5.147 5.146a.5.5 0 0 1-.708.708L8 8.707l-5.146 5.147a.5.5 0 0 1-.708-.708L7.293 8 2.146 2.854Z"
        />
      </svg>
    </button>

    @if (title()) {
      <h2 [id]="titleId()" class="text-2xl font-black text-slate mb-3">
        {{ title() }}
      </h2>
    }

    @if (description()) {
      <p class="text-[16px] text-gray-500 mb-8 font-medium leading-relaxed">
        {{ description() }}
      </p>
    }

    <ng-content></ng-content>

    <!-- Dynamic Action Buttons -->
    @if (buttons().length > 0) {
      <div class="flex justify-end gap-3 pt-8 mt-auto">
        @for (btn of buttons(); track btn.label) {
          <button
            (click)="btn.action()"
            [disabled]="btn.disabled"
            class="px-6 py-2.5 rounded-md text-[16px] font-bold transition-all interactive-element shadow-sm flex items-center justify-center min-w-[100px]"
            [class.bg-slate]="btn.type === 'primary' || btn.type === 'slate' || !btn.type"
            [class.text-white]="btn.type === 'primary' || btn.type === 'slate' || !btn.type || btn.type === 'danger'"
            [style.color]="(btn.type === 'primary' || btn.type === 'slate' || !btn.type || btn.type === 'danger') ? 'white' : ''"
            [class.hover:bg-black]="(btn.type === 'primary' || btn.type === 'slate' || !btn.type) && !btn.disabled"
            
            [class.text-gray-600]="btn.type === 'secondary' || btn.type === 'ghost'"
            [class.hover:bg-gray-50]="(btn.type === 'secondary' || btn.type === 'ghost') && !btn.disabled"
            [class.bg-transparent]="btn.type === 'secondary' || btn.type === 'ghost'"
            
            [class.bg-red-500]="btn.type === 'danger'"
            [class.hover:bg-red-600]="btn.type === 'danger' && !btn.disabled"
            
            [class.opacity-50]="btn.disabled"
            [class.cursor-not-allowed]="btn.disabled"
          >
            {{ btn.label }}
          </button>
        }
      </div>
    }
  </div>
</div>
