<!-- src/app/components/modals/forward-modal.component.html -->
<div class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-200 flex items-center justify-center p-4 animate-fade-in"
     tabindex="-1"
     role="dialog"
     aria-modal="true"
     aria-labelledby="forward-title"
     (click)="close()"
     (keydown.enter)="close()">
   <div class="bg-white p-8 rounded-xl shadow-[0_20px_60px_rgba(0,0,0,0.08)] w-96 border border-gray-100 transition-all duration-300"
        tabindex="-1"
        (click)="$event.stopPropagation()"
        (keydown)="$event.stopPropagation()"
        [class.scale-95]="!store.forwardTarget()"
        [class.scale-100]="store.forwardTarget()"
        [class.translate-y-0]="store.forwardTarget()"
        [class.opacity-0]="!store.forwardTarget()"
        [class.opacity-100]="store.forwardTarget()">
      <h3 class="text-2xl font-black text-slate mb-2">Apply Forward?</h3>
      <p class="text-[12px] text-gray-500 font-medium mb-6">Would you like this modification applied to all upcoming months in the timeline as well?</p>
      
      <label class="flex items-center gap-3 mb-10 cursor-pointer group py-2">
         <input type="checkbox" [checked]="store.autoApplyForward()" (change)="toggleAutoApply($event)" 
                class="w-5 h-5 text-slate bg-gray-50 border-gray-200 rounded-lg focus:ring-slate focus:ring-2 cursor-pointer transition-all">
         <span class="text-xs font-black uppercase tracking-wider text-gray-400 group-hover:text-slate transition-colors">Session Auto-Apply</span>
      </label>

      <div class="flex justify-start gap-4">
         <button (click)="store.executeForwardAction(undefined, true)" class="px-6 py-2.5 rounded-md text-[12px] font-black bg-slate text-white hover:bg-black transition-colors shadow-sm interactive-element">Apply Forward</button>
         <button (click)="store.executeForwardAction(undefined, false)" class="px-5 py-2.5 rounded-md text-[12px] font-bold text-gray-400 hover:text-gray-600 transition-colors interactive-element">Just Here</button>
      </div>
   </div>
</div>
