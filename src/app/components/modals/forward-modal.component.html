<!-- src/app/components/modals/forward-modal.component.html -->
<div class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-200 flex items-center justify-center p-4 animate-fade-in"
     tabindex="-1"
     role="dialog"
     aria-modal="true"
     aria-labelledby="forward-title"
     (click)="close()"
     (keydown.enter)="close()">
   <div class="bg-white p-8 rounded-[32px] shadow-[0_20px_60px_rgba(0,0,0,0.08)] w-[400px] border border-gray-100 transition-all duration-300 relative"
        tabindex="-1"
        (click)="$event.stopPropagation()"
        (keydown)="$event.stopPropagation()"
        [class.scale-95]="!store.forwardTarget()"
        [class.scale-100]="store.forwardTarget()"
        [class.translate-y-0]="store.forwardTarget()"
        [class.opacity-0]="!store.forwardTarget()"
        [class.opacity-100]="store.forwardTarget()">

      <button (click)="close()" (keydown.enter)="close()" class="btn-dismiss absolute top-8 right-8 interactive-element" aria-label="Close apply forward modal">
         <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 16 16">
            <path d="M2.146 2.854a.5.5 0 1 1 .708-.708L8 7.293l5.146-5.147a.5.5 0 0 1 .708.708L8.707 8l5.147 5.146a.5.5 0 0 1-.708.708L8 8.707l-5.146 5.147a.5.5 0 0 1-.708-.708L7.293 8 2.146 2.854Z" />
         </svg>
      </button>

      <h3 class="text-2xl font-black text-slate mb-6">Apply Forward?</h3>
      <p class="text-[16px] text-gray-600 font-medium mb-10 leading-relaxed">Would you like this modification applied to all upcoming months in the timeline as well?</p>
      
      <label class="flex items-center gap-3 mb-10 cursor-pointer group py-2">
         <input type="checkbox" [checked]="store.autoApplyForward()" (change)="toggleAutoApply($event)" 
                class="w-5 h-5 text-slate bg-gray-50 border-gray-200 rounded-lg focus:ring-slate focus:ring-2 cursor-pointer transition-all">
         <span class="text-[12px] font-black uppercase tracking-wider text-gray-600 group-hover:text-slate transition-colors">Session Auto-Apply</span>
      </label>

      <div class="flex justify-end gap-3">
         <button (click)="store.executeForwardAction(undefined, false)" class="px-5 py-2.5 rounded-md text-[16px] font-bold text-gray-600 hover:text-gray-800 transition-colors interactive-element">Just Here</button>
         <button (click)="store.executeForwardAction(undefined, true)" class="px-6 py-2.5 rounded-md text-[16px] font-bold bg-slate text-white hover:bg-black transition-colors shadow-sm interactive-element">Apply Forward</button>
      </div>
   </div>
</div>
