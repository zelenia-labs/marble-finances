<!-- src/app/components/modals/delete-modal.component.html -->
<div class="fixed inset-0 bg-slate/10 backdrop-blur-sm z-200 flex transition-all duration-300"
     [class.opacity-0]="!store.isDeleteModalOpen()"
     [class.pointer-events-none]="!store.isDeleteModalOpen()"
     [class.opacity-100]="store.isDeleteModalOpen()"
     role="dialog"
     aria-modal="true"
     aria-labelledby="delete-title">
   <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-white p-8 rounded-xl shadow-[0_20px_60px_rgba(0,0,0,0.08)] w-96 border border-gray-100 transition-all duration-300"
        [class.scale-95]="!store.isDeleteModalOpen()"
        [class.scale-100]="store.isDeleteModalOpen()"
        [class.translate-y-4]="!store.isDeleteModalOpen()"
        [class.translate-y-0]="store.isDeleteModalOpen()"
        [class.opacity-0]="!store.isDeleteModalOpen()"
        [class.opacity-100]="store.isDeleteModalOpen()">
      <h3 id="delete-title" class="text-2xl font-black text-slate mb-2">Delete Item?</h3>
      <p class="text-[12px] text-gray-500 font-medium mb-8">This action will remove the blocks and cannot be undone.</p>
      <div class="flex justify-start gap-3">
         <button (click)="store.executeDelete()" class="px-6 py-2.5 rounded-md text-[12px] font-bold bg-red-500 text-white hover:bg-red-600 transition-colors shadow-sm interactive-element">Delete</button>
         <button (click)="store.closeDeleteModal()" class="px-5 py-2.5 rounded-md text-[12px] font-bold text-gray-400 hover:text-gray-600 transition-colors interactive-element">Cancel</button>
      </div>
   </div>
</div>
