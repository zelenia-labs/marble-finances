<div class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-200 flex transition-all duration-300"
     [class.opacity-0]="!store.isDeleteModalOpen()"
     [class.pointer-events-none]="!store.isDeleteModalOpen()"
     [class.opacity-100]="store.isDeleteModalOpen()"
     role="dialog"
     aria-modal="true"
     aria-labelledby="delete-title">
   <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-white p-8 rounded-[32px] shadow-[0_20px_60px_rgba(0,0,0,0.08)] w-[400px] border border-gray-100 transition-all duration-300 relative"
        [class.scale-95]="!store.isDeleteModalOpen()"
        [class.scale-100]="store.isDeleteModalOpen()"
        [class.translate-y-4]="!store.isDeleteModalOpen()"
        [class.translate-y-0]="store.isDeleteModalOpen()"
        [class.opacity-0]="!store.isDeleteModalOpen()"
        [class.opacity-100]="store.isDeleteModalOpen()">

      <button (click)="store.closeDeleteModal()" (keydown.enter)="store.closeDeleteModal()" class="btn-dismiss absolute top-8 right-8 interactive-element" aria-label="Close delete modal">
         <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 16 16">
            <path d="M2.146 2.854a.5.5 0 1 1 .708-.708L8 7.293l5.146-5.147a.5.5 0 0 1 .708.708L8.707 8l5.147 5.146a.5.5 0 0 1-.708.708L8 8.707l-5.146 5.147a.5.5 0 0 1-.708-.708L7.293 8 2.146 2.854Z" />
         </svg>
      </button>

      <h3 id="delete-title" class="text-2xl font-black text-slate mb-6">Delete Item?</h3>
      <p class="text-[16px] text-gray-600 font-medium mb-10 leading-relaxed">This action will remove the blocks and cannot be undone.</p>
      
      <div class="flex justify-end gap-3">
         <button (click)="store.closeDeleteModal()" class="px-5 py-2.5 rounded-md text-[16px] font-bold text-gray-600 hover:text-gray-800 transition-colors interactive-element">Cancel</button>
         <button (click)="store.executeDelete()" class="px-6 py-2.5 rounded-md text-[16px] font-bold bg-red-500 text-white hover:bg-red-600 transition-colors shadow-sm interactive-element">Delete</button>
      </div>
   </div>
</div>
